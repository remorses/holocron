<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neug Asia Script Test</title>
    <style>
      @font-face {
        font-family: "Neug Asia Script Demo";
        src: url("./Neug%20Asia%20Script%20Demo.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        color-scheme: light;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f6f7fb;
        color: #111;
      }

      main {
        width: min(1100px, calc(100vw - 48px));
        margin: 40px auto;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 32px;
        color: #555;
        font-size: 15px;
      }

      .grid {
        display: grid;
        gap: 24px;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .label {
        margin: 0 0 20px;
        color: #666;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .reference {
        display: block;
        width: 100%;
        border-radius: 12px;
        background: #fff;
      }

      .sample {
        display: grid;
        place-items: center;
        min-height: 640px;
        background: #fff;
        border-radius: 12px;
      }

      .word {
        font-family: "Neug Asia Script Demo", cursive;
        font-size: clamp(168px, 24vw, 340px);
        line-height: 1;
        color: #000;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 24px, 1100px);
          margin: 12px auto 24px;
        }

        .card {
          padding: 16px;
          border-radius: 16px;
        }

        .sample {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Neug Asia Script Test</h1>
      <p>Reference image on top, local render below using the downloaded demo font.</p>

      <div class="grid">
        <section class="card">
          <div class="label">Reference</div>
          <img class="reference" src="../font-source-real.png" alt="Reference playwriter logotype" />
        </section>

        <section class="card">
          <div class="label">Neug Asia Script Demo</div>
          <div class="sample">
            <div class="word">playwriter</div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
